<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Dearest Alexandrine 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --valentine-red: #a30000;
            --soft-pink: #ffcad4;
            --cream: #FFF9F5;
            --text-brown: #5e503f;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream);
            color: var(--text-brown);
            overflow-x: hidden;
            /* Using heart as cursor */
            cursor: url('image_e8adfa.png'), auto;
        }

        #music-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--cream); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #yt-player { position: absolute; top: -9999px; left: -9999px; }

        .particle {
            position: fixed; top: -50px; z-index: 1;
            pointer-events: none; animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .section {
            min-height: 100vh; display: none;
            flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
            position: relative; z-index: 2;
        }
        .active { display: flex; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .penguin-img { width: 220px; margin-bottom: 15px; border-radius: 20px; }
        .bubble {
            background: white; padding: 20px; border-radius: 25px;
            border: 3px solid var(--soft-pink); margin-bottom: 25px;
            max-width: 320px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        #game-container {
            width: 90%; max-width: 500px; height: 350px; position: relative;
            background: white; border-radius: 20px; border: 3px solid var(--soft-pink); overflow: hidden;
        }
        .game-heart { 
            position: absolute; width: 50px; cursor: pointer;
            animation: floatAround 2.5s infinite ease-in-out; 
        }
        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30px, -40px); }
            50% { transform: translate(-30px, 30px); }
            75% { transform: translate(40px, 20px); }
        }

        .btn { padding: 15px 35px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; font-family: 'Poppins'; }
        .btn-yes { background: var(--valentine-red); color: white; }
        .btn-no { background: #ccc; color: #555; }

        .letter-card {
            background: white; padding: 40px; border-radius: 30px;
            max-width: 650px; text-align: left; line-height: 1.8;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin: 20px; border: 2px solid var(--soft-pink);
        }

        .camera-container {
            width: 300px; height: 180px; background: #333;
            border-radius: 20px 20px 5px 5px; position: relative;
            border-bottom: 10px solid #222; margin-top: 50px;
        }
        .camera-lens {
            width: 70px; height: 70px; background: #444; border: 5px solid #555; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .photo-slot { width: 240px; height: 8px; background: #111; position: absolute; bottom: -4px; left: 30px; }
        .polaroid {
            background: white; padding: 10px 10px 30px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: absolute; bottom: 0; left: 40px; opacity: 0; 
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s; z-index: -1;
        }
        .polaroid img { width: 200px; height: 240px; object-fit: cover; }
        .slide-out-1 { opacity: 1; transform: translateY(260px) rotate(-5deg); z-index: 10; }
        .slide-out-2 { opacity: 1; transform: translateY(530px) rotate(5deg); z-index: 10; }
        
        .cursor-trail {
            position: fixed; pointer-events: none; width: 25px; z-index: 9999;
            animation: fadeOut 0.7s forwards;
        }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.5) translateY(-20px); } }
    </style>
</head>
<body>

<div id="music-overlay">
    <img src="image_e9aa36.png" style="width:150px; margin-bottom:20px;">
    <h2 style="font-family:'Dancing Script'; font-size:2rem;">Ready for your surprise?</h2>
    <button class="btn btn-yes" onclick="unlockMusic()">Open Surprise 💌</button>
</div>

<div id="yt-player">
    <div id="player"></div>
</div>

<section id="stage1" class="section active">
    <img id="penguin" class="penguin-img" src="image_e9aa36.png">
    <div class="bubble"><p id="penguin-text">Hi Alexandrine! Do you want to see your surprise? 🐧✨</p></div>
    <div style="display:flex; gap:15px;">
        <button class="btn btn-yes" onclick="startEverything()">Yes! 😍</button>
        <button id="no-btn" class="btn btn-no" onclick="sadPenguin()">No ☹️</button>
    </div>
</section>

<section id="stage2" class="section">
    <h1 style="font-family:'Dancing Script'; font-size:3.5rem; color:var(--valentine-red);">Our Moments 📸</h1>
    <div class="camera-container">
        <div class="camera-lens"></div><div class="photo-slot"></div>
        <div id="pol1" class="polaroid"><img src="photo1.jpg"></div>
        <div id="pol2" class="polaroid"><img src="photo2.jpg"></div>
    </div>
    <div id="cam-btn" style="margin-top: 550px; display: none;">
        <button class="btn btn-yes" onclick="nextStage(3)">Continue? ✨</button>
    </div>
</section>

<section id="stage3" class="section">
    <h1 style="font-family:'Poppins'; font-weight:600;">Catch 29 Hearts for the Surprise! ✨</h1>
    <div id="game-container"></div>
    <h2 id="score-text" style="margin-top:20px;">Score: 0</h2>
</section>

<section id="stage4" class="section">
    <h1 style="font-family:'Dancing Script'; font-size:3rem; color:var(--valentine-red);">Para sa'yo, Alexandrine 💐</h1>
    <iframe style="width:95%; height:480px; border-radius:20px; border:none; margin-bottom:20px;" src="https://digibouquet.net/create-bouquet?b=JTdCJTIyZiUyMiUzQSU1QiUyMnJvc2UlMjIlMkMlMjJwZW9ueSUyMiUyQyUyMnR1bGlwJTIyJTJDJTIyZGFpc3klMjIlMkMlMjJsaWx5JTIyJTJDJTIyb3JjaGlkJTIyJTJDJTIyY2FtZWxsaWElMjIlMkMlMjJsb3R1cyUyMiU1RCUyQyUyMmclMjIlM0ElMjJncmVlbmVyeTQlMjIlMkMlMjJjJTIyJTNBJTIydG9ybi12aW50YWdlJTIyJTJDJTIydG8lMjIlM0ElMjJteSUyMGRlYXJlc3QlMjBBbGV4YW5kcmluZSUyMiUyQyUyMmZyJTIyJTNBJTIyU29waSUyMiUyQyUyMm0lMjIlM0ElMjJNYWhhbCUyMG5hJTIwbWFoYWwlMjBraXRhLiUyMFdhbGFuZyUyMGR1bG8uJTIwJTNBKSUyMiUyQyUyMmJnJTIyJTNBJTIybGF2ZW5kZXItZHJlYW0lMjIlN0Q="></iframe>
    <div class="letter-card">
        <p id="letter-content" style="white-space: pre-wrap; font-size: 1.1rem;"></p>
    </div>
</section>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0',
            width: '0',
            videoId: 'g78h7aPmq2Y',
            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'g78h7aPmq2Y' }
        });
    }

    function unlockMusic() {
        if(player) player.playVideo();
        document.getElementById('music-overlay').style.display = 'none';
    }

    function startEverything() {
        nextStage(2);
        setTimeout(() => document.getElementById('pol1').classList.add('slide-out-1'), 800);
        setTimeout(() => document.getElementById('pol2').classList.add('slide-out-2'), 2000);
        setTimeout(() => document.getElementById('cam-btn').style.display = 'block', 3500);
    }

    function nextStage(num) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('stage' + num).classList.add('active');
        if(num === 3) startHeartGame();
        if(num === 4) typeLetter();
    }

    function sadPenguin() {
        // Updated filename
        document.getElementById('penguin').src = "image_e9aa36.png";
        document.getElementById('penguin-text').innerText = "Oh... pinapaiyak mo naman ang penguin. ☹️";
        document.getElementById('no-btn').innerText = "Sige na nga, Yes na!";
        document.getElementById('no-btn').onclick = startEverything;
    }

    function createParticle() {
        const p = document.createElement('img');
        // Updated filename
        p.src = "image_e8adfa.png"; p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = (Math.random() * 20 + 15) + 'px';
        p.style.animationDuration = (Math.random() * 3 + 4) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 7000);
    }
    setInterval(createParticle, 500);

    let score = 0;
    function startHeartGame() {
        const container = document.getElementById('game-container');
        function spawn() {
            // Updated score limit to 29
            if (score >= 29) { nextStage(4); return; }
            const h = document.createElement('img');
            // Updated filename for game heart
            h.src = "image_e8adfa.png"; h.className = 'game-heart';
            h.style.left = Math.random() * 70 + 15 + '%';
            h.style.top = Math.random() * 70 + 15 + '%';
            h.onclick = () => { 
                score++; 
                document.getElementById('score-text').innerText = "Score: " + score; 
                h.remove(); 
                spawn(); 
            };
            container.appendChild(h);
        }
        spawn();
        // Updated limit check to 29
        setInterval(() => { if(score < 29 && container.children.length < 2) spawn(); }, 2000);
    }

    const message = `Mahal kong Alexandrine,

    Dalawang buwan na ang lumipas, pero pakiramdam ko parang araw-araw pa rin akong nahuhulog sa’yo sa paraang hindi maingay, hindi pilit, kundi dahan-dahan at totoo. Habang tumatagal, mas lalo kitang nakikilala, at mas lalo ring lumalalim ang nadarama ko sa’yo. Hindi na ito simpleng nadarama lang, kundi isang desisyong paulit-ulit kong pinipili araw-araw: ikaw.

    Salamat sa pagmamahal mo na hindi laging sinisigaw, pero laging nararamdaman. Sa mga maliliit mong ginagawa na madalas hindi napapansin ng iba pero sobrang laki para sa akin. Sa pagtingin mo sa akin kahit pagod ka na, sa pasensya mo kahit minsan hindi ako madaling intindihin, at sa pagpili mong manatili kahit hindi perpekto ang lahat. Nakikita ko lahat ‘yon. At sana alam mo kung gaano akong nagpapasalamat sa Diyos dahil binigyan niya ako ng pagkakataong mahalin ka sa buhay na ito.

    Salamat din sa mga sakripisyo mo na hindi mo na kailangang ipaliwanag. Sa mga pagkakataong ikaw ang umuunawa kahit hindi kompleto at magulo ang paliwanag ko, sa mga oras na ikaw ang gumagawa ng paraan para lang magkasundo tayo, at sa mga bigat na tahimik mong binubuhat para lang maging maayos tayo. Hindi ko man palaging nasasabi, pero ramdam na ramdam ko lahat ng ‘yon.

    Ikaw ang naging pahinga ko sa gitna ng magulong mundo. Sa dami ng ingay sa paligid, ikaw yung tahimik na parte na nagpapakalma sa akin. Kapag naiisip kita, parang humihinto saglit ang lahat at nagiging payapa. Hindi na ako naghahanap ng kung saan-saan para maramdaman ang “tahanan,” kasi sa’yo ko na nararamdaman ‘yon, sa boses mo, sa presensya mo, sa pagmamahal mo.

    At gusto kong malaman mo ito nang malinaw, mahal kita sa paraang hindi nauubos. Hindi ‘yung pagmamahal na pansamantala lang, hindi ‘yung nawawala kapag mahirap na, kundi ‘yung nananatili kahit tahimik, kahit pagod, kahit hindi perpekto ang lahat. Yung klase ng pagmamahal na walang dulo. Walang dulo, Alexandrine. Walang dulo. Mahal na mahal kita. :)`;

    let charIdx = 0;
    function typeLetter() {
        const el = document.getElementById('letter-content');
        if (charIdx < message.length) {
            el.textContent += message.charAt(charIdx);
            charIdx++;
            setTimeout(typeLetter, 45);
        }
    }

    window.addEventListener('mousemove', (e) => {
        const h = document.createElement('img');
        // Updated filename for trail
        h.src = "image_e8adfa.png"; h.className = 'cursor-trail';
        h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 700);
    });
</script>
</body>
</html>
