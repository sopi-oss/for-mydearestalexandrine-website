<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Dearest Alexandrine 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap');

        :root {
            --valentine-red: #e63946;
            --soft-pink: #ffcad4;
            --cream: #FFF9F5;
            --text-brown: #5e503f;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream);
            color: var(--text-brown);
            overflow-x: hidden; scroll-behavior: smooth;
            cursor: url('https://cur.cursors-4u.net/symbols/sym-9/sym847.cur'), auto;
        }

        .bg-dots {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#ffcad4 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1; opacity: 0.5;
        }

        .section {
            min-height: 100vh; display: none;
            flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
        }
        .active { display: flex; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .penguin-img { width: 180px; margin-bottom: 10px; }
        .bubble {
            background: white; color: var(--text-brown); padding: 20px;
            border-radius: 25px; border: 3px solid var(--soft-pink);
            margin-bottom: 25px; max-width: 320px;
        }

        .polaroid {
            background: white; padding: 12px 12px 35px 12px;
            transform: rotate(-2deg); transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08); border: 1px solid #eee; margin: 10px;
        }
        .polaroid img { width: 220px; height: 280px; object-fit: cover; }

        #game-container {
            width: 90%; max-width: 500px; height: 350px; position: relative;
            background: white; border-radius: 20px; border: 3px solid var(--soft-pink); overflow: hidden;
        }
        .pixel-heart { position: absolute; width: 40px; cursor: pointer; image-rendering: pixelated; }

        .letter-card {
            background: white; color: var(--text-brown);
            padding: 35px; border-radius: 30px; max-width: 600px;
            text-align: left; line-height: 1.8; border: 2px solid var(--soft-pink);
            margin: 20px;
        }

        iframe { width: 100%; height: 550px; border: 4px solid white; border-radius: 20px; }

        .btn { padding: 12px 30px; border-radius: 15px; border: none; cursor: pointer; font-weight: 600; font-family: 'Poppins'; }
        .btn-yes { background: var(--valentine-red); color: white; }
        .btn-no { background: #d3d3d3; color: #555; }

        .cursor-heart {
            position: fixed; pointer-events: none; width: 20px; z-index: 9999;
            image-rendering: pixelated; animation: heart-fade 0.7s forwards;
        }
        @keyframes heart-fade { 0% { opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }
    </style>
</head>
<body>

<div class="bg-dots"></div>

<audio id="myAudio" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<section id="stage1" class="section active">
    <img id="penguin" class="penguin-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZueXF4ZzR6NHJueGZueXF4ZzR6NHJueGZueXF4ZzR6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/L4lvBpHFmEofWvXpW9/giphy.gif">
    <div class="bubble"><p id="penguin-text">Hi Alexandrine! Do you want to see your surprise? 🐧✨</p></div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-yes" onclick="startExperience()">Yes! 😍</button>
        <button id="no-btn" class="btn btn-no" onclick="sadPenguin()">No ☹️</button>
    </div>
</section>

<section id="stage2" class="section">
    <h1 style="font-family:'Dancing Script'; font-size:3.5rem; color:var(--valentine-red);">Our Moments 📸</h1>
    <div style="display:flex; flex-wrap:wrap; justify-content:center;">
        <div class="polaroid"><img src="photo1.jpg"></div>
        <div class="polaroid"><img src="photo2.jpg"></div>
    </div>
    <br><button class="btn btn-yes" onclick="nextStage(3)">Continue? ✨</button>
</section>

<section id="stage3" class="section">
    <h1 style="font-family:'Playfair Display'; color:var(--valentine-red);">Catch the Hearts! ❤️</h1>
    <div id="game-container"></div>
    <h2 id="score-text">Hearts Caught: 0</h2>
</section>

<section id="stage4" class="section">
    <h1 style="font-family:'Dancing Script'; font-size:3rem; color:var(--valentine-red);">For You, Alexandrine 💐</h1>
    <iframe src="https://digibouquet.net/create-bouquet?b=JTdCJTIyZiUyMiUzQSU1QiUyMnJvc2UlMjIlMkMlMjJwZW9ueSUyMiUyQyUyMnR1bGlwJTIyJTJDJTIyZGFpc3klMjIlMkMlMjJsaWx5JTIyJTJDJTIyb3JjaGlkJTIyJTJDJTIyY2FtZWxsaWElMjIlMkMlMjJsb3R1cyUyMiU1RCUyQyUyMmclMjIlM0ElMjJncmVlbmVyeTQlMjIlMkMlMjJjJTIyJTNBJTIydG9ybi12aW50YWdlJTIyJTJDJTIydG8lMjIlM0ElMjJteSUyMGRlYXJlc3QlMjBBbGV4YW5kcmluZSUyMiUyQyUyMmZyJTIyJTNBJTIyU29waSUyMiUyQyUyMm0lMjIlM0ElMjJNYWhhbCUyMG5hJTIwbWFoYWwlMjBraXRhLiUyMFdhbGFuZyUyMGR1bG8uJTIwJTNBKSUyMiUyQyUyMmJnJTIyJTNBJTIybGF2ZW5kZXItZHJlYW0lMjIlN0Q="></iframe>
    <div class="letter-card">
        <p id="letter-content" style="white-space: pre-wrap;"></p>
    </div>
</section>

<script>
    const audio = document.getElementById("myAudio");

    function startExperience() {
        audio.play().catch(e => console.log("Music blocked until click"));
        nextStage(2);
    }

    function nextStage(num) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('stage' + num).classList.add('active');
        if(num === 3) startHeartGame();
        if(num === 4) typeLetter();
    }

    function sadPenguin() {
        document.getElementById('penguin').src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZ0ZzVqbmZ0ZzVqbmZ0ZzVqbmZ0ZzVqbmZ0ZzVqbmZ0ZzVqJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/OPWzhvH87K3S6v7X2r/giphy.gif";
        document.getElementById('penguin-text').innerText = "The penguin is very sad now... ☹️";
        document.getElementById('no-btn').innerText = "Go Back";
        document.getElementById('no-btn').onclick = () => location.reload();
    }

    let score = 0;
    function startHeartGame() {
        const container = document.getElementById('game-container');
        function spawn() {
            if (score >= 5) { nextStage(4); return; }
            const h = document.createElement('img');
            h.src = "https://i.imgur.com/vHInIu7.png";
            h.className = 'pixel-heart';
            h.style.left = Math.random() * 80 + 10 + '%';
            h.style.top = Math.random() * 80 + 10 + '%';
            h.onclick = () => { score++; document.getElementById('score-text').innerText = "Score: " + score; h.remove(); spawn(); };
            container.appendChild(h);
        }
        spawn();
    }

    const fullMessage = `Mahal kong Alexandrine,

Dalawang buwan na ang lumipas, pero pakiramdam ko parang araw-araw pa rin akong nahuhulog sa’yo sa paraang hindi maingay, hindi pilit, kundi dahan-dahan at totoo. Habang tumatagal, mas lalo kitang nakikilala, at mas lalo ring lumalalim ang nadarama ko sa’yo. Hindi na ito simpleng nadarama lang, kundi isang desisyong paulit-ulit kong pinipili araw-araw: ikaw.

Salamat sa pagmamahal mo na hindi laging sinisigaw, pero laging nararamdaman. Sa mga maliliit mong ginagawa na madalas hindi napapansin ng iba pero sobrang laki para sa akin. Sa pagtingin mo sa akin kahit pagod ka na, sa pasensya mo kahit minsan hindi ako madaling intindihin, at sa pagpili mong manatili kahit hindi perpekto ang lahat. Nakikita ko lahat ‘yon. At sana alam mo kung gaano akong nagpapasalamat sa Diyos dahil binigyan niya ako ng pagkakataong mahalin ka.

Salamat din sa mga sakripisyo mo na hindi mo na kailangang ipaliwanag. Ikaw ang naging pahinga ko sa gitna ng magulong mundo. Sa dami ng ingay sa paligid, ikaw yung tahimik na parte na nagpapakalma sa akin. 

At gusto kong malaman mo ito nang malinaw, mahal kita sa paraang hindi nauubos. Nananatili kahit tahimik, kahit pagod, kahit hindi perpekto ang lahat. Yung klase ng pagmamahal na walang dulo. Walang dulo, Alexandrine. Walang dulo. Mahal na mahal kita. :)`;

    let charIdx = 0;
    function typeLetter() {
        const el = document.getElementById('letter-content');
        if (charIdx < fullMessage.length) {
            el.textContent += fullMessage.charAt(charIdx);
            charIdx++;
            setTimeout(typeLetter, 30);
        }
    }

    window.addEventListener('mousemove', (e) => {
        const h = document.createElement('img');
        h.src = "https://i.imgur.com/vHInIu7.png";
        h.className = 'cursor-heart';
        h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 700);
    });
</script>

</body>
</html>
