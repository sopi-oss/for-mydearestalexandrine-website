<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Dearest Alexandrine 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --valentine-red: #d90429;
            --soft-pink: #ffb3c1;
            --dark-red: #800f2f;
            --gold: #ffb703;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0005 0%, #4d0011 100%);
            color: white;
            overflow-x: hidden;
            cursor: none; /* We will use a custom heart cursor */
        }

        /* Moving Stars Background */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Custom Heart Cursor */
        .cursor-heart {
            position: fixed;
            pointer-events: none;
            color: var(--valentine-red);
            font-size: 1.5rem;
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: heart-fade 0.8s forwards;
        }

        @keyframes heart-fade {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -100%) scale(0.5); opacity: 0; }
        }

        /* Intro Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: #1a0005;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .heart-loader {
            font-size: 50px;
            animation: beat 1s infinite;
            color: var(--valentine-red);
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Main Content */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--soft-pink);
            text-shadow: 0 0 20px var(--valentine-red);
        }

        /* Love Letter Section */
        .letter-box {
            background: rgba(217, 4, 41, 0.15);
            border: 2px solid var(--valentine-red);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin: 40px 0;
            min-height: 200px;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        /* Polaroid Gallery */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 50px 0;
        }

        .polaroid {
            background: white;
            padding: 15px 15px 40px 15px;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.4s;
            cursor: pointer;
        }

        .polaroid img {
            width: 200px;
            height: 250px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .polaroid:hover {
            transform: scale(1.1) rotate(5deg);
            z-index: 10;
        }

        /* Catch the Heart Game */
        #game-area {
            position: relative;
            width: 100%;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border: 2px dashed var(--soft-pink);
            border-radius: 20px;
            margin: 50px 0;
            overflow: hidden;
            display: none; /* Shown later */
        }

        .falling-heart {
            position: absolute;
            font-size: 25px;
            cursor: pointer;
        }

        /* Hidden Bouquet Section */
        .hidden-gift {
            margin-top: 50px;
            display: none;
        }

        .btn {
            background: var(--valentine-red);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px var(--valentine-red);
        }

        .btn:hover {
            background: #ff4d6d;
            transform: scale(1.1);
        }

        iframe {
            width: 100%;
            height: 500px;
            border: 2px solid var(--gold);
            border-radius: 15px;
            margin-top: 20px;
        }

        /* Final Message Overlay */
        #final-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(128, 15, 47, 0.95);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 2s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Music Toggle */
        .music-ctrl {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            color: black;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
        }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>
    <div id="loader">
        <div class="heart-loader">❤️</div>
        <p>Loading Love for Alexandrine...</p>
    </div>

    <div class="music-ctrl" onclick="toggleMusic()">🎵</div>
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Mahal Kong Alexandrine,</h1>
        
        <div class="letter-box" id="typing-text">
            </div>

        <div class="gallery">
            <div class="polaroid"><img src="photo1.jpg" alt="Us"></div>
            <div class="polaroid"><img src="photo2.jpg" alt="Memory"></div>
            <div class="polaroid"><img src="photo3.jpg" alt="Always"></div>
        </div>

        <button class="btn" onclick="showGame()">Play a game for a gift? 🎮</button>

        <div id="game-area">
            <p>Catch 5 hearts to reveal your gift!</p>
            <p>Score: <span id="score">0</span></p>
        </div>

        <div class="hidden-gift" id="gift-section">
            <h2 style="font-family: 'Dancing Script';">A special bouquet for you...</h2>
            <iframe src="https://www.google.com/search?q=virtual+flower+bouquet+for+her&tbm=isch"></iframe>
            <br><br>
            <button class="btn" onclick="showFinal()">Open My Last Message 💌</button>
        </div>
    </div>

    <div id="final-overlay">
        <h1 style="font-size: 4rem;">Mahal kita, Alexandrine.</h1>
        <h2 style="font-family: 'Dancing Script';">Palagi. ✨</h2>
        <button class="btn" onclick="document.getElementById('final-overlay').style.display='none'">❤️</button>
    </div>

    <script>
        // 1. Loader Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    startTyping();
                }, 1000);
            }, 2000);
        });

        // 2. Typing Effect
        const fullText = "Dalawang buwan na ang lumipas, pero pakiramdam ko parang araw-araw pa rin akong nahuhulog sa’yo sa paraang hindi maingay, hindi pilit, kundi dahan-dahan at totoo. Habang tumatagal, mas lalo kitang nakikilala, at mas lalo ring lumalalim ang nadarama ko sa'yo. Hindi na ito simpleng nadarama lang, kundi isang desisyong paulit-ulit kong pinipili araw-araw: ikaw.";
        let i = 0;
        function startTyping() {
            if (i < fullText.length) {
                document.getElementById("typing-text").innerHTML += fullText.charAt(i);
                i++;
                setTimeout(startTyping, 40);
            }
        }

        // 3. Star Canvas
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = Array(150).fill().map(() => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 0.5 + 0.2
        }));

        function animateStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y -= s.speed;
                if (s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(animateStars);
        }
        animateStars();

        // 4. Heart Cursor
        window.addEventListener('mousemove', (e) => {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('cursor-heart');
            heart.style.left = e.pageX + 'px';
            heart.style.top = e.pageY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        });

        // 5. Game Logic
        let score = 0;
        function showGame() {
            document.getElementById('game-area').style.display = 'block';
            spawnHeart();
        }

        function spawnHeart() {
            if (score >= 5) {
                document.getElementById('game-area').style.display = 'none';
                document.getElementById('gift-section').style.display = 'block';
                return;
            }
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'falling-heart';
            heart.style.left = Math.random() * 90 + '%';
            heart.style.top = '0px';
            heart.onclick = () => {
                score++;
                document.getElementById('score').innerText = score;
                heart.remove();
                spawnHeart();
            };
            document.getElementById('game-area').appendChild(heart);
            
            let pos = 0;
            const fall = setInterval(() => {
                pos += 2;
                heart.style.top = pos + 'px';
                if (pos > 300) {
                    clearInterval(fall);
                    heart.remove();
                    spawnHeart();
                }
            }, 20);
        }

        function showFinal() {
            document.getElementById('final-overlay').style.display = 'flex';
        }

        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            if (music.paused) music.play();
            else music.pause();
        }
    </script>
</body>
</html>
